{{ define "styles" }}
<style>
  .err-wrap { min-height: calc(100vh - 280px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 0; }
  .err-code { font-family: 'Syne', sans-serif; font-size: clamp(5rem, 18vw, 9rem); font-weight: 800; line-height: 0.9; letter-spacing: -0.02em; color: var(--g); -webkit-text-stroke: 0; margin-bottom: 0.5rem; }
  .err-sub { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; color: var(--fg); margin-bottom: 1rem; -webkit-text-stroke: 0; }
  .err-body { font-size: 0.95rem; line-height: 1.75; color: var(--fm); font-weight: 300; max-width: 44ch; margin-bottom: 2.5rem; }
  .err-drone { width: 100px; height: 100px; margin-bottom: 1.5rem; opacity: 0.7; animation: err-float 3.5s ease-in-out infinite; }
  @keyframes err-float { 0%,100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-10px) rotate(-4deg); } }
  .err-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
  .err-btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 600; color: var(--n3); background: var(--g); padding: 0.75rem 1.6rem; border-radius: 0.5rem; text-decoration: none; transition: background 0.15s, transform 0.1s; }
  .err-btn-primary:hover { background: var(--o); transform: translateY(-1px); }
  .err-btn-ghost { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; font-weight: 500; color: var(--fm); border: 1px solid var(--bdrh); padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; transition: border-color 0.15s, color 0.15s; }
  .err-btn-ghost:hover { border-color: var(--g); color: var(--g); }
</style>
{{ end }}

{{ define "main" }}
<div class="err-wrap">
  <svg class="err-drone" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="20" y1="20" x2="50" y2="50" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="20" x2="50" y2="50" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="20" y1="80" x2="50" y2="50" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="80" y1="80" x2="50" y2="50" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="20" cy="20" rx="13" ry="3.5" fill="#f5c518" fill-opacity="0.6" transform="rotate(-30 20 20)"/>
    <ellipse cx="80" cy="20" rx="13" ry="3.5" fill="#f5c518" fill-opacity="0.6" transform="rotate(30 80 20)"/>
    <ellipse cx="20" cy="80" rx="13" ry="3.5" fill="#f08c00" fill-opacity="0.6" transform="rotate(30 20 80)"/>
    <ellipse cx="80" cy="80" rx="13" ry="3.5" fill="#f08c00" fill-opacity="0.6" transform="rotate(-30 80 80)"/>
    <circle cx="20" cy="20" r="4" fill="#222"/>
    <circle cx="80" cy="20" r="4" fill="#222"/>
    <circle cx="20" cy="80" r="4" fill="#222"/>
    <circle cx="80" cy="80" r="4" fill="#222"/>
    <rect x="38" y="38" width="24" height="24" rx="5" fill="#1a1815" stroke="#333" stroke-width="1.2"/>
    <circle cx="50" cy="50" r="5" fill="#111" stroke="#f5c518" stroke-width="1.2"/>
    <path d="M44 30L40 22M56 30L60 22M48 30L48 20M52 30L52 20" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round"/>
  </svg>

  <div class="err-code">404</div>
  <div class="err-sub">Signal verloren</div>
  <p class="err-body">Diese Seite ist abgestürzt oder existiert nicht. Lass uns zurück zur sicheren Landezone fliegen.</p>

  <div class="err-btns">
    <a href="/" class="err-btn-primary">Zur Startseite →</a>
    <a href="https://discord.gg/pFyZEdx4vQ" class="err-btn-ghost" target="_blank" rel="noopener">Zum Discord</a>
  </div>
</div>
{{ end }}
