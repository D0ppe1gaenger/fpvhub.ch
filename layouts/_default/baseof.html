<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ .Site.Title }}{{ if not .IsHome }} – {{ .Title }}{{ end }}</title>
<meta name="description" content="Die zentrale FPV-Community der Region.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --g: #f5c518; --o: #f08c00;
    --n3: #080b18; --n2: #0f1326; --n1: #161b35; --n0: #1e2440;
    --fg: #edeae0; --fm: rgba(237,234,224,0.6); --fd: rgba(237,234,224,0.28);
    --bdr: rgba(245,197,24,0.13); --bdrh: rgba(245,197,24,0.3);
  }
  html, body { background: var(--n3); color: var(--fg); font-family: 'Space Grotesk', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  #bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .nav-right { display: flex; align-items: center; gap: 1rem; }
  .nav-link { font-size: 0.82rem; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--fm); text-decoration: none; transition: color 0.15s; }
  .nav-link:hover { color: var(--g); }
  .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 4px; }
  .hamburger span { display: block; width: 22px; height: 2px; background: var(--fg); border-radius: 2px; transition: all 0.3s; }
  .mobile-menu { display: none; flex-direction: column; gap: 0; background: var(--n1); border: 1px solid var(--bdr); border-radius: 0.75rem; padding: 0.5rem; margin-top: 0.5rem; }
  .mobile-menu a { padding: 0.85rem 1rem; font-size: 0.9rem; font-weight: 500; color: var(--fm); text-decoration: none; border-radius: 0.5rem; transition: background 0.15s, color 0.15s; }
  .mobile-menu a:hover { background: var(--n0); color: var(--g); }
  .mobile-menu.open { display: flex; }
  @media (max-width: 640px) { .nav-link { display: none; } .cta-sm { display: none; } .hamburger { display: flex; } }
  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 2rem; }
  nav { display: flex; align-items: center; justify-content: space-between; padding: 1.6rem 0; border-bottom: 1px solid var(--bdr); }
  .navlogo { display: flex; align-items: center; gap: 0.75rem; text-decoration: none; }
  .navlogo img { width: 40px; height: 40px; border-radius: 8px; object-fit: contain; }
  .navlogo-name { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 800; letter-spacing: 0.03em; color: var(--fg); line-height: 1; }
  .navlogo-name b { color: var(--g); }
  .cta-sm { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--n3); background: var(--g); padding: 0.45rem 1.1rem; border-radius: 2rem; text-decoration: none; transition: background 0.15s; }
  .cta-sm:hover { background: var(--o); }
  footer { padding: 2rem 0 2.5rem; margin-top: 1rem; border-top: 1px solid var(--bdr); display: flex; justify-content: space-between; align-items: center; }
  .footer-l { display: flex; align-items: center; gap: 0.8rem; }
  .footer-logo { width: 26px; height: 26px; object-fit: contain; border-radius: 4px; padding: 2px; opacity: 0.7; }
  footer small { font-size: 0.73rem; color: var(--fd); }
  .footer-r { display: flex; align-items: center; gap: 1.2rem; }
  .footer-r a { font-size: 0.73rem; color: var(--fd); text-decoration: none; transition: color 0.15s; }
  .footer-r a:hover { color: var(--g); }
  .scroll-top { position: fixed; bottom: 1.5rem; right: 1.5rem; width: 44px; height: 44px; border-radius: 50%; background: var(--g); color: var(--n3); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.2s, background 0.15s, transform 0.15s; z-index: 50; }
  .scroll-top.show { opacity: 1; pointer-events: auto; }
  .scroll-top:hover { background: var(--o); transform: translateY(-2px); }
</style>
{{ block "styles" . }}{{ end }}
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="wrap">
  <nav>
    <a href="/" class="navlogo">
      <img src="/logo.png" alt="FPV Hub Logo">
      <span class="navlogo-name">FPV<b>HUB</b></span>
    </a>
    <div class="nav-right">
      <a href="/news" class="nav-link">News</a>
      <a href="/partners" class="nav-link">Partner</a>
      <a href="/models/" class="nav-link">FPV Parts</a>
      <a href="/team" class="nav-link">Team</a>
      <a href="https://discord.gg/pFyZEdx4vQ" class="cta-sm" target="_blank" rel="noopener">Discord beitreten</a>
      <button class="hamburger" onclick="toggleMenu()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
    </div>
  </nav>
  <div class="mobile-menu" id="mobileMenu">
    <a href="/news" onclick="toggleMenu()">News</a>
    <a href="/partners" onclick="toggleMenu()">Partner</a>
    <a href="/models/" onclick="toggleMenu()">FPV Parts</a>
    <a href="/team" onclick="toggleMenu()">Team</a>
    <a href="https://discord.gg/pFyZEdx4vQ" target="_blank" rel="noopener" onclick="toggleMenu()">Discord beitreten</a>
  </div>
  <button id="scrollTop" class="scroll-top" aria-label="Nach oben scrollen" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M9 14V3M3 8L9 2L15 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
  {{ block "main" . }}{{ end }}
  <footer>
    <div class="footer-l">
      <img src="/logo.png" alt="" class="footer-logo">
      <small>© 2025 fpvhub.ch | Copyright</small>
    </div>
    <div class="footer-r">
      <a href="https://discord.gg/pFyZEdx4vQ" target="_blank" rel="noopener">Discord</a>
    </div>
  </footer>
</div>
<script>
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, pts;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  function init() { pts = Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.25,vy:(Math.random()-.5)*.25,r:Math.random()*1.3+.3,a:Math.random()*.25+.04,g:Math.random()>.4})); }
  function frame() {
    ctx.clearRect(0,0,W,H);
    for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.g?`rgba(245,197,24,${p.a})`:`rgba(240,140,0,${p.a*.5})`;ctx.fill();}
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<100){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(245,197,24,${.06*(1-d/100)})`;ctx.lineWidth=.5;ctx.stroke();}}
    requestAnimationFrame(frame);
  }
  resize();init();frame();
  window.addEventListener('resize',()=>{resize();init();});
</script>
 <script>
  function toggleMenu() {
    document.getElementById('mobileMenu').classList.toggle('open');
  }
  document.addEventListener('click', function(e) {
    const menu = document.getElementById('mobileMenu');
    if (!e.target.closest('.nav-right') && !e.target.closest('.mobile-menu')) {
      menu.classList.remove('open');
    }
  });
</script>
<script>
window.addEventListener('scroll', function() {
  const btn = document.getElementById('scrollTop');
  if (window.scrollY > 400) btn.classList.add('show');
  else btn.classList.remove('show');
});
</script>
{{ block "scripts" . }}{{ end }}
</body>
</html>
