{{ define "styles" }}
<style>
  .page-hero { padding: 4rem 0 3rem; }
  .eyebrow { font-size: 0.67rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; color: var(--o); margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.6rem; }
  .eyebrow::after { content:''; flex:1; height:1px; background:var(--bdr); }
  h1 { font-family: 'Syne', sans-serif; font-size: clamp(2.4rem, 5vw, 3.6rem); font-weight: 800; line-height: 1.0; letter-spacing: -0.01em; margin-bottom: 1rem; -webkit-text-stroke: 0; }
  h1 span { color: var(--g); }
  .page-sub { font-size: 1rem; line-height: 1.75; color: var(--fm); font-weight: 300; max-width: 52ch; }

  .news-list { display: flex; flex-direction: column; gap: 1rem; padding: 3rem 0; }

  .news-card { background: var(--n1); border: 1px solid var(--bdr); border-radius: 1rem; padding: 2rem 2.25rem; transition: border-color 0.2s; }
  .news-card:hover { border-color: var(--bdrh); }

  .news-time { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--g); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
  .news-time::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--g); }

  .news-content { font-size: 0.92rem; line-height: 1.85; color: var(--fm); font-weight: 300; word-break: break-word; }
  .news-content p { margin-bottom: 1rem; }
  .news-content strong { color: var(--fg); font-weight: 600; }
  .news-content p:has(u) { display: flex; align-items: center; gap: 0.5rem; margin: 1.5rem 0 1rem; }
  .news-content p:has(u):first-child { margin-top: 0; }
  .news-content u { color: var(--g); text-decoration: none; font-weight: 700; font-family: 'Syne', sans-serif; font-size: 1.05rem; letter-spacing: 0.02em; }
  .news-content em { color: var(--fg); font-style: normal; opacity: 0.85; }

  .news-image { width: 100%; max-height: 320px; object-fit: cover; border-radius: 0.6rem; margin-top: 1rem; display: block; }

  .news-empty { text-align: center; padding: 4rem 1rem; color: var(--fm); }
  .news-empty-icon { font-size: 2rem; margin-bottom: 1rem; opacity: 0.5; }

  .news-loading { text-align: center; padding: 3rem 1rem; color: var(--fd); font-size: 0.85rem; }
  .news-card { cursor: pointer; }
  .news-card.collapsed .news-content,
  .news-card.collapsed .news-image { display: none; }
  .news-card.collapsed .news-time { margin-bottom: 0; }
  .news-chevron { margin-left: auto; transition: transform 0.2s; color: var(--fd); font-size: 1rem; }
  .news-card.collapsed .news-chevron { transform: rotate(0deg); }
  .news-card:not(.collapsed) .news-chevron { transform: rotate(90deg); }
  @keyframes skeleton-pulse { 0%,100% { opacity: 0.5; } 50% { opacity: 1; } }
  .sk-line { background: rgba(245,197,24,0.12); border-radius: 4px; animation: skeleton-pulse 1.5s ease-in-out infinite; }
</style>
{{ end }}

{{ define "main" }}
<div class="page-hero">
  <div class="eyebrow">News</div>
  <h1>FPV Hub <span>News</span></h1>
  <p class="page-sub">Die neuesten Updates und Ankündigungen direkt aus unserem Discord-Server.</p>
</div>

<div class="news-list" id="news-list">
  <div class="news-card" style="cursor:default;">
    <div class="sk-line" style="width:140px;height:12px;margin-bottom:1.5rem;"></div>
    <div class="sk-line" style="width:100%;height:10px;margin-bottom:0.6rem;"></div>
    <div class="sk-line" style="width:90%;height:10px;margin-bottom:0.6rem;"></div>
    <div class="sk-line" style="width:70%;height:10px;"></div>
  </div>
  <div class="news-card" style="cursor:default;opacity:0.6;">
    <div class="sk-line" style="width:120px;height:12px;margin-bottom:1.5rem;"></div>
    <div class="sk-line" style="width:95%;height:10px;"></div>
  </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
fetch('https://fpvhub-bot-production.up.railway.app')
  .then(r => r.json())
  .then(data => {
    const list = document.getElementById('news-list');
    const news = data.news || [];

    if (news.length === 0) {
      list.innerHTML = '<div class="news-empty"><div class="news-empty-icon">📰</div>Noch keine News vorhanden.</div>';
      return;
    }

    list.innerHTML = news.map((item, index) => {
      const date = new Date(item.timestamp);
      const dateStr = date.toLocaleDateString('de-CH', { day: '2-digit', month: '2-digit', year: 'numeric' });
      const timeStr = date.toLocaleTimeString('de-CH', { hour: '2-digit', minute: '2-digit' });

      const images = (item.attachments || [])
        .filter(a => a.contentType && a.contentType.startsWith('image/'))
        .map(a => `<img src="${a.url}" class="news-image" alt="Anhang" loading="lazy">`)
        .join('');

      function parseDiscordMarkdown(text) {
      text = text
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      text = text.replace(/&lt;@&amp;?(\d+)&gt;/g, '');
      text = text.replace(/&lt;@!?\d+&gt;/g, '');
      text = text.replace(/&lt;#\d+&gt;/g, '');
      text = text.replace(/&lt;@&\d+&gt;/g, '');

      text = text.replace(/\*\*\_\_(.+?)\_\_\*\*/g, '<strong><u>$1</u></strong>');
      text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/\_\_(.+?)\_\_/g, '<u>$1</u>');
      text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
      text = text.replace(/~~(.+?)~~/g, '<s>$1</s>');
      text = text.split('\n\n').map(p => p.trim()).filter(p => p).map(p => `<p>${p.replace(/\n/g, '<br>')}</p>`).join('');

      return text.trim();
    }

    const content = parseDiscordMarkdown(item.content || '');

    const isFirst = index === 0;
    return `
       <div class="news-card ${isFirst ? '' : 'collapsed'}" onclick="this.classList.toggle('collapsed')">
        <div class="news-time">
           ${dateStr} · ${timeStr}
           <span class="news-chevron">›</span>
          </div>
          <div class="news-content">${content}</div>
         ${images}
         </div>
       `;
    }).join('');
  })
  .catch(() => {
    document.getElementById('news-list').innerHTML = '<div class="news-empty"><div class="news-empty-icon">⚠️</div>News konnten nicht geladen werden.</div>';
  });
</script>
{{ end }}
